name: Deploy to production

# Authoritative deploy path. Triggered on every push to main.
# Concurrency group ensures only ONE production deploy is in flight at a
# time — any newer push cancels the older in-flight run.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_q4NLjxlN6vYdLnr5uygwzDNw
      VERCEL_PROJECT_ID: prj_3GXDnzqirYx3vLBlfWaavnUe7mTq
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
