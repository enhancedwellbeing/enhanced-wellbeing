<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enhanced Wellbeing — Launch Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #B8860B; --gold-rich: #A07608; --gold-light: #D4A340;
    --gold-glow: rgba(184,134,11,0.18);
    --pink-soft: #FDE8EC; --pink-mid: #F5C6CE; --pink-deep: #E8A0AE;
    --blush: #FFF0ED; --cream: #FFFAF8;
    --page-bg: linear-gradient(170deg, #FFFAF8 0%, #FFF5F0 40%, #FFF8F4 100%);
    --card-bg: #FFFFFF;
    --text-dark: #2A1F24; --text-body: #4A3540;
    --text-secondary: #7A6470; --text-muted: #B09DA8;
    --green: #4A8B4A; --green-bg: rgba(74,139,74,0.07);
    --green-border: rgba(74,139,74,0.25);
    --border-gold: rgba(184,134,11,0.2); --border-soft: rgba(200,185,195,0.2);
    --shadow-card: 0 2px 16px rgba(140,100,120,0.07);
    --shadow-gold: 0 4px 24px rgba(184,134,11,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--page-bg); font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; color: var(--text-body); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .serif { font-family: 'Playfair Display', Georgia, serif; }
  .header { background: linear-gradient(135deg, #FFF0ED 0%, #FFF7F0 50%, #FFFBF3 100%); border-bottom: 1px solid var(--border-gold); padding: 36px 44px 28px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand-icon { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, #E8A0AE, #D4A340); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #fff; box-shadow: var(--shadow-gold); letter-spacing: -0.5px; }
  .brand-title { font-size: 30px; font-weight: 700; letter-spacing: -0.03em; color: var(--text-dark); }
  .brand-title span { color: var(--gold); }
  .brand-sub { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); margin-top: 2px; text-transform: uppercase; }
  .badges { display: flex; gap: 10px; flex-wrap: wrap; }
  .badge { padding: 7px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; border: 1px solid var(--border-gold); background: rgba(184,134,11,0.05); color: var(--gold-rich); }
  .badge.pink { border-color: rgba(232,160,174,0.3); background: rgba(232,160,174,0.08); color: var(--pink-deep); }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; margin-top: 28px; }
  .metric-card { background: var(--card-bg); border: 1px solid var(--border-gold); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow-card); position: relative; overflow: hidden; }
  .metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--pink-deep), var(--gold)); }
  .metric-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .metric-value { font-size: 32px; font-weight: 800; color: var(--gold); line-height: 1; letter-spacing: -0.02em; }
  .metric-sub { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  .progress-section { padding: 22px 44px 0; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .progress-count { font-size: 14px; font-weight: 700; color: var(--gold); }
  .progress-track { height: 8px; background: var(--pink-soft); border-radius: 4px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.04); }
  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--pink-deep), var(--gold-light), var(--gold)); transition: width 0.6s ease; box-shadow: 0 0 12px var(--gold-glow); }
  .tabs { padding: 20px 44px 0; border-bottom: 1px solid var(--border-soft); display: flex; gap: 6px; }
  .tab-btn { padding: 10px 26px; border: none; background: transparent; font-family: inherit; font-size: 15px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.25s ease; }
  .tab-btn.active { color: var(--gold); font-weight: 700; border-bottom-color: var(--gold); }
  .tab-btn:hover:not(.active) { color: var(--text-secondary); }
  .content { padding: 30px 44px 60px; }
  .phase-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-card); margin-bottom: 24px; border: 1px solid var(--border-soft); }
  .phase-card.active { border-color: var(--gold-light); }
  .phase-header { padding: 20px 24px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-soft); }
  .phase-card.active .phase-header { background: rgba(184,134,11,0.03); }
  .phase-left { display: flex; align-items: center; gap: 14px; }
  .phase-num { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; background: var(--card-bg); }
  .phase-card.active .phase-num { border: 2px solid var(--gold-light); color: var(--gold); }
  .phase-card:not(.active) .phase-num { border: 2px solid var(--border-soft); color: var(--text-muted); }
  .phase-name { font-size: 18px; font-weight: 700; color: var(--text-dark); }
  .phase-status { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .phase-card.active .phase-status { color: var(--gold); }
  .phase-card:not(.active) .phase-status { color: var(--text-muted); }
  .phase-pct { text-align: right; }
  .phase-pct-value { font-size: 22px; font-weight: 800; }
  .phase-card.active .phase-pct-value { color: var(--gold); }
  .phase-card:not(.active) .phase-pct-value { color: var(--text-muted); }
  .phase-pct-count { font-size: 11px; color: var(--text-muted); }
  .phase-items { padding: 16px 24px 20px; }
  .check-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; margin-bottom: 3px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; user-select: none; }
  .check-item:hover { background: rgba(184,134,11,0.03); }
  .check-item.done { background: var(--green-bg); }
  .check-box { width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0; border: 2px solid var(--border-soft); background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; font-size: 14px; font-weight: 700; color: #fff; }
  .check-item.done .check-box { border-color: var(--green); background: var(--green); color: #fff; }
  .check-label { font-size: 15px; color: var(--text-body); transition: all 0.2s; font-weight: 500; }
  .check-item.done .check-label { color: var(--text-muted); text-decoration: line-through; }
  .decision-card { background: var(--card-bg); border: 1px solid var(--border-gold); border-left: 5px solid var(--gold); border-radius: 14px; padding: 22px 26px; box-shadow: var(--shadow-card); margin-bottom: 16px; }
  .decision-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .decision-title { font-size: 17px; font-weight: 700; color: var(--text-dark); }
  .decision-badge { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 6px; background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); flex-shrink: 0; margin-left: 14px; }
  .decision-rationale { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
  .decision-date { font-size: 12px; color: var(--text-muted); margin-top: 10px; }
  .people-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 16px; }
  .person-card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 14px; padding: 26px; box-shadow: var(--shadow-card); transition: all 0.3s ease; }
  .person-card:hover { box-shadow: 0 4px 24px rgba(184,134,11,0.1); border-color: var(--border-gold); }
  .person-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .person-icon { width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg, var(--pink-soft), rgba(212,163,64,0.1)); border: 1px solid var(--border-gold); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .person-name { font-size: 17px; font-weight: 700; color: var(--text-dark); }
  .person-role { font-size: 13px; font-weight: 600; color: var(--gold); margin-top: 2px; }
  .person-context { font-size: 13px; color: var(--text-secondary); background: var(--pink-soft); border-radius: 8px; padding: 10px 14px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .tab-desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
  .footer { padding: 18px 44px; text-align: center; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border-soft); letter-spacing: 0.02em; }
  .footer span { color: var(--gold); font-weight: 600; }

  /* Mobile responsive */
  @media (max-width: 640px) {
    .header { padding: 24px 18px 20px; }
    .brand-icon { width: 42px; height: 42px; font-size: 18px; border-radius: 11px; }
    .brand-title { font-size: 22px; }
    .brand-sub { font-size: 10px; }
    .badges { gap: 6px; }
    .badge { padding: 5px 10px; font-size: 11px; border-radius: 8px; }
    .metrics { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
    .metric-card { padding: 14px 16px; border-radius: 12px; }
    .metric-value { font-size: 22px; }
    .metric-label { font-size: 10px; margin-bottom: 5px; }
    .metric-sub { font-size: 11px; }
    .progress-section { padding: 16px 18px 0; }
    .progress-label { font-size: 12px; }
    .progress-count { font-size: 12px; }
    .tabs { padding: 14px 18px 0; gap: 2px; }
    .tab-btn { padding: 9px 16px; font-size: 14px; }
    .content { padding: 20px 18px 40px; }
    .phase-card { border-radius: 12px; margin-bottom: 16px; }
    .phase-header { padding: 14px 16px 12px; }
    .phase-num { width: 32px; height: 32px; font-size: 14px; border-radius: 8px; }
    .phase-name { font-size: 15px; }
    .phase-pct-value { font-size: 18px; }
    .phase-items { padding: 10px 14px 14px; }
    .check-item { padding: 9px 10px; gap: 10px; }
    .check-box { width: 22px; height: 22px; border-radius: 6px; }
    .check-label { font-size: 13px; }
    .decision-card { padding: 16px 18px; border-radius: 12px; margin-bottom: 12px; }
    .decision-title { font-size: 15px; }
    .decision-rationale { font-size: 13px; }
    .people-grid { grid-template-columns: 1fr; gap: 12px; }
    .person-card { padding: 20px; border-radius: 12px; }
    .person-icon { width: 42px; height: 42px; font-size: 20px; border-radius: 10px; }
    .person-name { font-size: 15px; }
    .person-role { font-size: 12px; }
    .person-context { font-size: 12px; padding: 8px 12px; }
    .tab-desc { font-size: 13px; margin-bottom: 14px; }
    .footer { padding: 14px 18px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="header"><div class="header-top"><div class="brand"><div><div class="brand-title serif">Enhanced <span>Wellbeing</span></div><div class="brand-sub">Launch Command Center</div></div></div><div class="badges"><div class="badge">Pre-Launch</div><div class="badge pink">Queensland, Australia</div></div></div><div class="metrics" id="metrics"></div></div>
<div class="progress-section"><div class="progress-row"><span class="progress-label">Overall Progress</span><span class="progress-count" id="progress-text">0/23 tasks — 0%</span></div><div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div></div>
<div class="tabs"><button class="tab-btn active" data-tab="roadmap">Roadmap</button><button class="tab-btn" data-tab="decisions">Decisions</button><button class="tab-btn" data-tab="people">Key People</button></div>
<div class="content"><div class="tab-content active" id="tab-roadmap"></div><div class="tab-content" id="tab-decisions"></div><div class="tab-content" id="tab-people"></div></div>
<div class="footer">Enhanced Wellbeing Launch Command Center — Powered by <span>Memory</span> — Updated 2026-03-13 12:30</div>
<script>
const DATA={metrics:[{"label": "Budget Target", "value": "~$10K (self-build approach)", "sub": "Self-build approach"}, {"label": "Focus Areas", "value": "4", "sub": "GLP-1, Hair/Skin, Sexual Health, Peptides"}, {"label": "Current Phase", "value": "1 of 4", "sub": "Foundations"}, {"label": "Decisions Made", "value": "6", "sub": "All active"}],phases:[{"id": 1, "name": "Foundations", "status": "in-progress", "items": ["Company registration (ABN / ACN)", "AHPRA practitioner research", "Sprint Law \u2014 telehealth agreement", "Sprint Law \u2014 privacy policy", "Sprint Law \u2014 limitation of liability", "Professional indemnity insurance", "Medmate partnership formalised", "TGA advertising compliance research"]}, {"id": 2, "name": "Platform Build", "status": "upcoming", "items": ["Website design & development (Next.js)", "Telehealth consultation flow", "Patient intake & questionnaire system", "Payment gateway integration", "Pharmacy API / order routing", "AI chatbot for patient triage"]}, {"id": 3, "name": "Operations", "status": "upcoming", "items": ["Philippines call centre sourced", "AI automation workflows live", "CRM & patient management", "Supply chain agreements"]}, {"id": 4, "name": "Launch & Growth", "status": "upcoming", "items": ["Beta testing with initial patients", "Marketing campaign launch", "NDIS registration via Avaana", "Government grants (QLD + Federal)", "Mobile app (React Native)"]}],decisions:[{"date": "2026-03-12", "title": "Self-Build Website & App", "rationale": "Full control, learn valuable skills, save ~$18K+ vs outsourcing (~$10K vs ~$40K total setup).", "status": "Active"}, {"date": "2026-03-12", "title": "Tech Stack Direction", "rationale": "Modern stack, good for sleek fast sites, React Native shares code with web.", "status": "Active"}, {"date": "2026-03-12", "title": "Sprint Law for Legal", "rationale": "Specialist in this space, referenced helpful guide on running a medical practice.", "status": "Active"}, {"date": "2026-03-12", "title": "Medmate as Pharmacy Partner", "rationale": "Provides both practitioner and pharmacy network access, plus supply agreement potential.", "status": "Active"}, {"date": "2026-03-12", "title": "AI-First Automation Strategy", "rationale": "Reduce overhead, increase speed, keep the operation lean.", "status": "Active"}, {"date": "2026-03-12", "title": "Brand Identity", "rationale": "Clean, trustworthy, high-end wellness \u2014 not cold or clinical.", "status": "Active"}],people:[{"name": "Jackson Potter", "role": "Co-Owner / Co-Director", "context": "Business development, strategy, operations & growth", "emoji": "\ud83d\udc51"}, {"name": "Kaitlyn Malone", "role": "Co-Owner / Co-Director", "context": "Creative design, visual identity, marketing & brand", "emoji": "\u2728"}, {"name": "Tom", "role": "Government Business Specialist", "context": "Great resource \u2014 very helpful with grants & compliance", "emoji": "\ud83c\udfdb\ufe0f"}, {"name": "Medmate", "role": "Pharmacy & Practitioner Partner", "context": "Core partnership for telehealth fulfilment & supply", "emoji": "\ud83d\udc8a"}, {"name": "Sprint Law", "role": "Legal Services Provider", "context": "Telehealth agreement, liability & privacy policy", "emoji": "\u2696\ufe0f"}]};
const checked={};const totalTasks=DATA.phases.reduce((s,p)=>s+p.items.length,0);
function updateProgress(){const done=Object.values(checked).filter(Boolean).length;const pct=Math.round((done/totalTasks)*100);document.getElementById('progress-text').textContent=done+'/'+totalTasks+' tasks \u2014 '+pct+'%';document.getElementById('progress-fill').style.width=pct+'%';DATA.phases.forEach(phase=>{const pd=phase.items.filter((_,i)=>checked[phase.id+'-'+i]).length;const pp=Math.round((pd/phase.items.length)*100);const el=document.getElementById('phase-pct-'+phase.id);if(el)el.textContent=pp+'%';const ct=document.getElementById('phase-count-'+phase.id);if(ct)ct.textContent=pd+'/'+phase.items.length;})}
document.getElementById('metrics').innerHTML=DATA.metrics.map(m=>'<div class="metric-card"><div class="metric-label">'+m.label+'</div><div class="metric-value serif">'+m.value+'</div><div class="metric-sub">'+m.sub+'</div></div>').join('');
document.getElementById('tab-roadmap').innerHTML=DATA.phases.map(phase=>{const a=phase.status==='in-progress';return '<div class="phase-card '+(a?'active':'')+'"><div class="phase-header"><div class="phase-left"><div class="phase-num">'+phase.id+'</div><div><div class="phase-name">'+phase.name+'</div><div class="phase-status">'+(a?'In Progress':'Upcoming')+'</div></div></div><div class="phase-pct"><div class="phase-pct-value" id="phase-pct-'+phase.id+'">0%</div><div class="phase-pct-count" id="phase-count-'+phase.id+'">0/'+phase.items.length+'</div></div></div><div class="phase-items">'+phase.items.map((item,idx)=>'<div class="check-item" data-key="'+phase.id+'-'+idx+'" onclick="toggleCheck(this)"><div class="check-box"></div><span class="check-label">'+item+'</span></div>').join('')+'</div></div>'}).join('');
document.getElementById('tab-decisions').innerHTML='<p class="tab-desc">Every key decision, logged with context so nothing gets lost between sessions.</p>'+DATA.decisions.map(d=>'<div class="decision-card"><div class="decision-top"><div class="decision-title">'+d.title+'</div><span class="decision-badge">'+d.status+'</span></div><div class="decision-rationale">'+d.rationale+'</div><div class="decision-date">'+d.date+'</div></div>').join('');
document.getElementById('tab-people').innerHTML='<p class="tab-desc">Your key contacts and partners on this journey.</p><div class="people-grid">'+DATA.people.map(p=>'<div class="person-card"><div class="person-top"><div class="person-icon">'+p.emoji+'</div><div><div class="person-name">'+p.name+'</div><div class="person-role">'+p.role+'</div></div></div><div class="person-context">'+p.context+'</div></div>').join('')+'</div>';
document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-'+btn.dataset.tab).classList.add('active')});});
function toggleCheck(el){const key=el.dataset.key;checked[key]=!checked[key];el.classList.toggle('done',checked[key]);el.querySelector('.check-box').innerHTML=checked[key]?'\u2713':'';updateProgress()}
</script>
</body>
</html>
